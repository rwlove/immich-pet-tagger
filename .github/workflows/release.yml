name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.1.0 or v1.1.0)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; reusing it for this re-run."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL="${{ steps.tag.outputs.tag }}"
          else
            FULL="${{ github.ref_name }}"
          fi
          echo "tag=${FULL}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - variant: cuda
            build_arg: CUDA=true
            stable_tag: latest
            free_disk: true
          - variant: rocm
            build_arg: ROCM=true
            stable_tag: rocm
            free_disk: false
          - variant: cpu
            build_arg: ""
            stable_tag: cpu
            free_disk: false
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        if: matrix.free_disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/immich-pet-tagger"
          VERSION="${{ needs.prepare.outputs.tag }}"
          SUFFIX="${{ matrix.variant == 'cuda' && '' || format('-{0}', matrix.variant) }}"
          echo "tags=${IMAGE}:${VERSION}${SUFFIX},${IMAGE}:${{ matrix.stable_tag }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: ${{ matrix.build_arg }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
