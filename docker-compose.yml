services:
  immich-pet-tagger:
    build:
      context: .
      args:
        CUDA: "true"   # NVIDIA GPU. Switch to ROCM: "true" for AMD, or remove both for CPU-only.
    container_name: immich-pet-tagger
    restart: unless-stopped
    ports:
      - "8000:8000"       # Enrollment UI
    environment:
      - IMMICH_URL=http://immich-server:2283     # Change if Immich is on a different host/port
      - IMMICH_API_KEY=your_api_key_here
      - IMMICH_EXTERNAL_URL=http://localhost:2283 # Immich URL as seen from your browser
      - POLL_INTERVAL=300                        # Seconds between scans
      # GPU_WORKERS: parallel YOLO + CLIP inference threads. 2 is optimal for most GPUs.
      # SCAN_WORKERS defaults to GPU_WORKERS * 32 (fills GPU batches efficiently).
      # Override only if Immich feels slow during scans: - SCAN_WORKERS=32
      - GPU_WORKERS=2
      - THRESHOLD=0.8                            # Min confidence to assign a face
      # - DRY_RUN=true                           # Uncomment to disable writing to Immich
      # CLIP model settings (optional — defaults match Immich's built-in model)
      # - CLIP_MODEL=ViT-B-16
      # - CLIP_PRETRAINED=openai
    # NVIDIA GPU access. For AMD, replace driver: nvidia with driver: amdgpu.
    # Remove this entire deploy section for CPU-only.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # This is where pet folders (luna/, pixel/) and config.json live.
      # Windows: use forward slashes, e.g.:
      #   - C:/Users/yourname/immich-pet-tagger/data:/data
      # Linux/macOS:
      #   - /home/yourname/immich-pet-tagger/data:/data
      - ./data:/data
      - ./app:/app
    networks:
      - immich_default           # Must match the network name in your Immich compose file

# If you run this compose file standalone (not merged with Immich's compose),
# define the network here and set it as external if Immich already created it.
networks:
  immich_default:
    external: true             # Remove this line if running a standalone test without Immich
