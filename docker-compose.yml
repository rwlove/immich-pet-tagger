services:
  immich-pet-tagger:
    build:
      context: .
      args:
        CUDA: "true"   # NVIDIA GPU — switch to ROCM: "true" for AMD, or remove for CPU-only
    container_name: immich-pet-tagger
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - IMMICH_URL=http://immich-server:2283      # ← name of your Immich container
      - IMMICH_API_KEY=your_api_key_here          # ← required
      - IMMICH_EXTERNAL_URL=http://localhost:2283 # ← how your browser reaches Immich
      - POLL_INTERVAL=300
      - GPU_WORKERS=2
      - THRESHOLD=0.8
      # - CLIP_MODEL=ViT-B-16
      # - CLIP_PRETRAINED=openai
    # For AMD: replace driver: nvidia with driver: amdgpu
    # For CPU-only: remove the entire deploy section
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./data:/data
      - ./app:/app
    networks:
      - immich_default  # ← must match the network name below

networks:
  immich_default:       # ← set to your Immich Docker network name (docker network ls)
    external: true      # this network is created by Immich's compose, not this one
