services:
  immich-pet-tagger:
    image: ghcr.io/tedornitier/immich-pet-tagger:cpu  # GPU: use :latest (NVIDIA) or :rocm (AMD)
    # build: section below is only needed if you want to build from source instead of pulling the image
    build:
      context: .
      args:
        CUDA: "false"  # set to "true" for NVIDIA GPU, or ROCM: "true" for AMD
    container_name: immich-pet-tagger
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - IMMICH_URL=http://immich-server:2283      # name of your Immich container
      - IMMICH_API_KEY=your_api_key_here          # generate in Immich: Account Settings, API Keys
      - IMMICH_EXTERNAL_URL=http://localhost:2283 # how your browser reaches Immich
      - POLL_INTERVAL=300
      - GPU_WORKERS=1
      - THRESHOLD=0.8
    # Uncomment the section below to enable NVIDIA GPU acceleration.
    # Requires nvidia-container-toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
    # For AMD, replace driver: nvidia with driver: amdgpu and use the :rocm image tag above.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    volumes:
      - ./data:/data
      - model_cache:/root/.cache
    networks:
      - immich_default  # must match the network name below

volumes:
  model_cache:

networks:
  immich_default:       # set to your Immich Docker network name (docker network ls)
    external: true      # this network is created by Immich's compose, not this one
